version: '3.8'

services:
  app:
    build: .
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - DATABASE_URL=sqlite:///./dev.db
      - JWT_SECRET=change-this-in-production
      - NODE_ENV=production
    volumes:
      - db-data:/app/backend
      - uploads:/app/backend/uploads
    restart: unless-stopped

volumes:
  db-data:
  uploads:
